services:
  - type: web
    name: fiszki-w-biegu-api
    runtime: rust
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: cargo build --release
    startCommand: ./target/release/fiszki-w-biegu
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
