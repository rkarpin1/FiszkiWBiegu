<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiszkiWBiegu</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <script>
        var GOOGLE_CLIENT_ID = '71847229905-mqalk30tubb1pstdjq73krh0ovasqf2f.apps.googleusercontent.com';

        window._googleToken = null;
        window._googleSignInError = null;

        var _gsiOverlay = null;

        function _removeGsiOverlay() {
            if (_gsiOverlay && _gsiOverlay.parentNode) {
                _gsiOverlay.parentNode.removeChild(_gsiOverlay);
            }
            _gsiOverlay = null;
        }

        // Renderuje oficjalny przycisk Google w nakładce modalnej.
        // Kliknięcie przycisku otwiera popup logowania (nawigacja first-party do
        // accounts.google.com) — działa bez cookies stron trzecich i bez aktywnej
        // sesji Google, w przeciwieństwie do One Tap (google.accounts.id.prompt).
        function _runGoogleSignIn(onSuccess, onError) {
            if (!window.google || !window.google.accounts || !window.google.accounts.id) {
                onError('Google Sign-In SDK nie jest gotowy. Odśwież stronę i spróbuj ponownie.');
                return;
            }

            _removeGsiOverlay();

            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: function(response) {
                    _removeGsiOverlay();
                    onSuccess(response.credential);
                },
                ux_mode: 'popup',
                auto_select: false,
                itp_support: true
            });

            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;display:flex;' +
                'align-items:center;justify-content:center;background:rgba(0,0,0,0.55);';

            var card = document.createElement('div');
            card.style.cssText = 'background:#fff;padding:28px 24px;border-radius:16px;display:flex;' +
                'flex-direction:column;align-items:center;gap:18px;box-shadow:0 10px 40px rgba(0,0,0,0.3);';

            var title = document.createElement('div');
            title.textContent = 'Zaloguj się przez Google';
            title.style.cssText = 'font-family:sans-serif;font-size:16px;color:#111;';

            var btnHost = document.createElement('div');

            var cancel = document.createElement('button');
            cancel.textContent = 'Anuluj';
            cancel.style.cssText = 'background:none;border:none;color:#666;font-size:14px;' +
                'cursor:pointer;font-family:sans-serif;';
            cancel.onclick = function() {
                _removeGsiOverlay();
                onError('Logowanie anulowane.');
            };

            card.appendChild(title);
            card.appendChild(btnHost);
            card.appendChild(cancel);
            overlay.appendChild(card);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    _removeGsiOverlay();
                    onError('Logowanie anulowane.');
                }
            });
            document.body.appendChild(overlay);
            _gsiOverlay = overlay;

            google.accounts.id.renderButton(btnHost, {
                type: 'standard',
                theme: 'filled_blue',
                size: 'large',
                text: 'continue_with',
                shape: 'pill',
                logo_alignment: 'center'
            });
        }

        // Kotlin/JS: callback-based
        window._initiateGoogleSignIn = function(onSuccess, onError) {
            _runGoogleSignIn(onSuccess, onError);
        };

        // Kotlin/WASM: polling-based
        window._triggerGoogleSignIn = function() {
            window._googleToken = null;
            window._googleSignInError = null;
            _runGoogleSignIn(
                function(credential) { window._googleToken = credential; },
                function(msg) { window._googleSignInError = msg; }
            );
        };

        // Sprzątanie nakładki (np. przy timeoucie / anulowaniu po stronie Kotlin)
        window._cancelGoogleSignIn = function() {
            _removeGsiOverlay();
        };
    </script>
</head>
<body style="text-align: center; align-content: center">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
        <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
        <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
                stroke-dasharray="90 125">
            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                              repeatCount="indefinite"/>
        </circle>
    </svg>
    <script type="application/javascript" src="webApp.js"></script>
</body>
</html>
